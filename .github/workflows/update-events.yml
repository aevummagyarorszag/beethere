name: Auto Update Event Memory

on:
  schedule:
    - cron: '0 0 * * *'  # Minden éjfékor automatikusan lefut
  workflow_dispatch:      # Kézi indítás gomb

permissions:
  contents: write

jobs:
  run-updater:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run memory updater script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_events.py

      - name: Save and push updated events.json to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          git commit -m "Auto-update event memory via Gemini AI" || exit 0
          git push
