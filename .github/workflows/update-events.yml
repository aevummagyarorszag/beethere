name: Auto Update Event Memory

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every night at 00:00 UTC
  workflow_dispatch:      # Manual trigger button

jobs:
  run-updater:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4

      - name: Run memory updater script
        run: python update_events.py

      - name: Save and push updated events.json to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          git commit -m "Auto-update event memory" || exit 0
          git push
